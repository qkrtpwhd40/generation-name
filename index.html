<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>세대톡 - 함께 만드는 세대 언어 사전</title>
  <style>
    :root {
      --ink: #1d252c;
      --muted: #61717d;
      --line: #dce5ea;
      --paper: #f6f9fb;
      --card: #ffffff;
      --nav: #17222b;
      --blue: #3979d8;
      --mint: #2fbf9b;
      --rose: #e94f75;
      --gold: #f2aa3c;
      --shadow: 0 18px 42px rgba(29, 37, 44, .1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    svg { flex: 0 0 auto; }

    .signup {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(47,191,155,.2), transparent 38%),
        linear-gradient(315deg, rgba(57,121,216,.18), transparent 34%),
        var(--paper);
    }
    .signup-card {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      box-shadow: var(--shadow);
    }
    .signup-side {
      display: grid;
      align-content: center;
      gap: 18px;
      padding: 32px;
      color: white;
      background:
        radial-gradient(circle at 80% 18%, rgba(242,170,60,.9), transparent 18%),
        linear-gradient(135deg, #17222b, #246b70 70%, #2fbf9b);
    }
    .signup-side h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .signup-side p { margin: 0; color: rgba(255,255,255,.84); line-height: 1.55; }
    .signup-form { padding: 30px; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      background: var(--nav);
      color: white;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
      font-size: 23px;
      font-weight: 900;
    }
    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #102029;
      background: linear-gradient(135deg, var(--mint), var(--gold));
      font-weight: 900;
    }
    .user-box {
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      background: rgba(255,255,255,.07);
    }
    .user-box strong { display: block; margin-bottom: 4px; }
    .user-box span { color: #b7c7ce; font-size: 13px; }
    .nav { display: grid; gap: 8px; }
    .nav button {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 0 12px;
      border-radius: 8px;
      color: #dbe6eb;
      background: transparent;
      text-align: left;
    }
    .nav button.active, .nav button:hover { color: white; background: rgba(255,255,255,.12); }
    .nav svg { width: 19px; height: 19px; }

    main { padding: 28px; }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 22px;
    }
    .search { position: relative; }
    .search svg {
      position: absolute;
      left: 16px;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translateY(-50%);
      color: var(--muted);
    }
    .search input {
      width: 100%;
      height: 52px;
      padding: 0 18px 0 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      outline: none;
      box-shadow: 0 8px 18px rgba(29,37,44,.04);
    }
    .search input:focus { border-color: var(--blue); }
    .pill {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      border-radius: 999px;
      background: #e8f6f2;
      color: #126b58;
      font-weight: 900;
      white-space: nowrap;
    }
    .pill.danger { background: #fff0f4; color: #a02748; }

    .hero {
      min-height: 220px;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      overflow: hidden;
      margin-bottom: 26px;
      border-radius: 8px;
      color: white;
      background:
        radial-gradient(circle at 83% 18%, rgba(242,170,60,.9), transparent 20%),
        linear-gradient(120deg, #12343f, #246b70 52%, #2fbf9b);
      box-shadow: var(--shadow);
    }
    .hero-copy { align-self: center; padding: 30px; }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(31px, 4vw, 50px);
      line-height: 1.06;
      letter-spacing: 0;
    }
    .hero p { max-width: 640px; margin: 0; color: rgba(255,255,255,.86); line-height: 1.55; }
    .hero-art { position: relative; min-height: 220px; }
    .bubble {
      position: absolute;
      padding: 12px 14px;
      border-radius: 8px;
      color: #17303a;
      background: rgba(255,255,255,.92);
      box-shadow: 0 18px 28px rgba(0,0,0,.16);
      font-weight: 900;
    }
    .bubble small { display: block; margin-top: 3px; color: var(--muted); font-weight: 800; }
    .b1 { left: 16%; top: 28px; transform: rotate(-4deg); }
    .b2 { right: 12%; top: 86px; transform: rotate(3deg); }
    .b3 { left: 26%; bottom: 28px; transform: rotate(2deg); }

    .view { display: none; }
    .view.active { display: block; }
    .section { margin-bottom: 28px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    h2 { margin: 0; font-size: 22px; }
    h3 { margin: 0; }
    .link-btn {
      padding: 8px 4px;
      color: var(--blue);
      background: transparent;
      font-weight: 900;
    }
    .feed {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(250px, 31%);
      gap: 14px;
      overflow-x: auto;
      padding: 2px 2px 16px;
      scroll-snap-type: x mandatory;
    }
    .dictionary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
      gap: 14px;
    }
    .word-card, .rank-panel, .form, .quiz-box, .profile-grid > section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 10px 24px rgba(29,37,44,.05);
    }
    .word-card {
      min-height: 190px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 18px;
      scroll-snap-align: start;
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .word-title {
      padding: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
    }
    .word-title h3 { font-size: 24px; }
    .meaning { margin: 0; color: var(--muted); line-height: 1.45; }
    .meta { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .tag {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      background: #eef4f7;
      color: #415461;
      font-size: 12px;
      font-weight: 900;
    }
    .tag.owner { background: #fff7e8; color: #8a5a08; }
    .heart {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--rose);
      background: #fff0f4;
    }
    .heart.active { color: white; background: var(--rose); }
    .heart svg { width: 20px; height: 20px; fill: currentColor; }
    .rank-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .rank-panel { padding: 16px; }
    .rank-panel h3 { font-size: 17px; }
    .rank-list { display: grid; gap: 9px; }
    .rank-row {
      min-height: 44px;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border-radius: 8px;
      color: var(--ink);
      background: #f8fbfc;
      text-align: left;
    }
    .rank-num {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: white;
      background: #17303a;
      font-size: 13px;
      font-weight: 900;
    }
    .rank-row span { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }

    .form { max-width: 820px; padding: 20px; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    label { display: grid; gap: 7px; color: #30414c; font-weight: 900; }
    input, select, textarea {
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      outline: none;
    }
    textarea { min-height: 104px; resize: vertical; }
    .wide { grid-column: 1 / -1; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .primary, .secondary {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      border-radius: 8px;
      font-weight: 900;
    }
    .primary { color: white; background: var(--blue); }
    .secondary { color: #263741; background: #edf3f6; }
    .primary svg, .secondary svg { width: 20px; height: 20px; }
    .quiz-box { padding: 18px; }
    .quiz-question { margin: 8px 0 14px; font-size: 23px; font-weight: 900; }
    .choices { display: grid; gap: 10px; max-width: 760px; }
    .choice {
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfc;
      font-weight: 900;
      text-align: left;
    }
    .choice.correct { border-color: var(--mint); background: #e7f8f3; }
    .choice.wrong { border-color: var(--rose); background: #fff0f4; }
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
    }
    .profile-grid > section { padding: 18px; }
    .empty { margin: 6px 0 0; color: var(--muted); }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(12,20,26,.48);
    }
    .modal.active { display: grid; }
    .dialog {
      width: min(700px, 100%);
      padding: 22px;
      border-radius: 8px;
      background: white;
      box-shadow: var(--shadow);
    }
    .dialog-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }
    .dialog h2 { margin: 0 0 6px; font-size: 32px; }
    .close {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #edf3f6;
      font-size: 22px;
    }
    .detail-row {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .detail-row strong { display: block; margin-bottom: 5px; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: 8px;
      color: white;
      background: #17303a;
      box-shadow: var(--shadow);
      font-weight: 800;
    }

    @media (max-width: 940px) {
      .app, .signup-card { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .nav { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .nav button { justify-content: center; }
      .nav span { display: none; }
      main { padding: 20px; }
      .hero { grid-template-columns: 1fr; }
      .rank-grid, .profile-grid { grid-template-columns: 1fr; }
      .feed { grid-auto-columns: minmax(245px, 82%); }
    }
    @media (max-width: 560px) {
      .topbar, .form-grid { grid-template-columns: 1fr; }
      .hero-copy { padding: 22px; }
      .hero-art { display: none; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

            <div class="topbar">
              <div class="search">${icon("search")}<input id="searchInput" placeholder="세대 언어, 의미, 예문, 분야 검색" value="${esc(state.search)}"></div>
              <div class="pill ${state.online ? "" : "danger"}">${state.online ? "온라인 참여형" : "오프라인 임시모드"}</div>
            </div>
            <section id="home" class="view ${state.view === "home" ? "active" : ""}">${homeView()}</section>
            <section id="dictionary" class="view ${state.view === "dictionary" ? "active" : ""}">${dictionaryView()}</section>
            <section id="quiz" class="view ${state.view === "quiz" ? "active" : ""}">${quizView()}</section>
            <section id="profile" class="view ${state.view === "profile" ? "active" : ""}">${profileView()}</section>
          </main>
        </div>
        <div id="modal" class="modal"></div>
      `;
      bindEvents();
    }

    function renderSignup() {
      root.innerHTML = `
        <div class="signup">
          <div class="signup-card">
            <section class="signup-side">
              <div class="brand"><div class="brand-mark">말</div><div>세대톡</div></div>
              <h1>모든 세대가 함께 쓰는 언어 사전</h1>
              <p>나이대별 신조어를 찾고, 내가 아는 표현을 등록해서 다른 사용자들과 함께 세대 언어 사전을 만들어가요.</p>
            </section>
            <form class="signup-form" id="signupForm">
              <div class="form-grid">
                <label>나이대
                  <select name="age" required>${ageGroups.map(a => `<option>${a}</option>`).join("")}</select>
                </label>
                <label>닉네임 <input name="nickname" required placeholder="예: 말랑이"></label>
                <label>아이디 <input name="userid" required placeholder="아이디"></label>
                <label>비밀번호 <input name="password" type="password" required placeholder="비밀번호"></label>
              </div>
              <div class="actions"><button class="primary" type="submit">${icon("plus")} 시작하기</button></div>
            </form>
          </div>
        </div>
      `;
      document.getElementById("signupForm").addEventListener("submit", signup);
    }

    async function signup(e) {
      e.preventDefault();
      const form = new FormData(e.currentTarget);
      const user = {
        age: form.get("age"),
        nickname: form.get("nickname").trim(),
        userid: form.get("userid").trim(),
        password: form.get("password")
      };
      try {
        const data = await api("/api/signup", { method: "POST", body: JSON.stringify(user) });
        state.user = data.user;
        state.online = true;
      } catch (error) {
        state.user = { age: user.age, nickname: user.nickname, userid: user.userid };
        state.online = false;
        toast("서버 연결이 없어 이 브라우저에만 가입 정보가 저장돼요.");
      }
      saveLocal();
      await loadWords();
    }

    function navButton(view, iconName, label) {
      return `<button class="${state.view === view ? "active" : ""}" data-view="${view}" title="${label}">${icon(iconName)}<span>${esc(label)}</span></button>`;
    }

    function filteredWords() {
      const q = state.search.trim().toLowerCase();
      if (!q) return state.words;
      return state.words.filter(w => [w.word, w.meaning, w.example, w.field, w.author, ...w.ages].join(" ").toLowerCase().includes(q));
    }

    function homeView() {
      const recommended = filteredWords().filter(w => w.ages.includes(state.user.age));
      const source = recommended.length ? recommended : filteredWords();
      return `
        <section class="hero">
          <div class="hero-copy">
            <h1>세대 언어를 함께 모으고 함께 배워요</h1>
            <p>내 세대가 쓰는 말부터 다른 세대의 표현까지 검색하고, 등록자 닉네임이 표시되는 참여형 사전으로 소통의 간격을 줄여요.</p>
          </div>
          <div class="hero-art">
            <div class="bubble b1">킹받네<small>10대, 20대</small></div>
            <div class="bubble b2">따봉<small>50대 이상</small></div>
            <div class="bubble b3">알잘딱깔센<small>20대, 30대</small></div>
          </div>
        </section>
        <section class="section">
          <div class="section-head"><h2>${esc(state.user.age)}에게 추천하는 세대 언어</h2></div>
          <div class="feed">${source.map(wordCard).join("") || emptyCard()}</div>
        </section>
        <section class="section">
          <div class="section-head"><h2>분야별 인기 순위</h2></div>
          <div class="rank-grid">
            ${rankPanel("우리 세대가 많이 쓰는 말", state.words.filter(w => w.ages.includes(state.user.age)))}
            ${rankPanel("모든 세대 인기 언어", state.words)}
            ${rankPanel("내가 관심 있어 하는 언어", likedWords())}
          </div>
        </section>
      `;
    }

    function dictionaryView() {
      return `
        <section class="section">
          <div class="section-head">
            <h2>세대 언어 사전</h2>
            <button class="primary" data-view="profile">${icon("plus")} 신조어 등록</button>
          </div>
          <div class="dictionary-grid">
            ${filteredWords().sort((a,b) => b.rank - a.rank).map(wordCard).join("") || emptyCard()}
          </div>
        </section>
      `;
    }

    function quizView() {
      if (!state.quiz) startQuiz(false);
      if (state.quiz.done) {
        const weak = Object.entries(state.quiz.misses).sort((a,b) => b[1] - a[1])[0];
        return `
          <section class="quiz-box">
            <p class="tag">퀴즈 완료</p>
            <h2>${state.quiz.score} / 10문제 정답</h2>
            <p class="meaning">부족한 분야: ${weak ? esc(weak[0]) : "아직 없음"}</p>
            <div class="actions">
              <button class="primary" id="restartQuiz">${icon("quiz")} 맞춤형 퀴즈 다시 풀기</button>
              <button class="secondary" data-view="profile">프로필에서 복습하기</button>
            </div>
          </section>
        `;
      }
      const item = state.quiz.items[state.quiz.index];
      return `
        <section class="quiz-box">
          <p class="tag">${state.quiz.index + 1} / 10</p>
          <div class="quiz-question">"${esc(item.word)}"의 뜻은?</div>
          <div class="choices">
            ${item.choices.map(choice => `<button class="choice" data-choice="${esc(choice)}">${esc(choice)}</button>`).join("")}
          </div>
        </section>
      `;
    }

    function profileView() {
      const liked = likedWords();
      const stats = Object.entries(state.quizStats).sort((a,b) => b[1].miss - a[1].miss);
      return `
        <section class="profile-grid">
          <section>
            <h2>관심 단어</h2>
            ${liked.length ? `<div class="rank-list">${liked.map((w,i) => rankRow(w,i)).join("")}</div>` : `<p class="empty">하트를 누른 단어가 아직 없어요.</p>`}
          </section>
          <section>
            <h2>부족한 분야</h2>
            ${stats.length ? `<div class="rank-list">${stats.map(([field, s], i) => `<div class="rank-row"><div class="rank-num">${i+1}</div><div><strong>${esc(field)}</strong><span>오답 ${s.miss}개, 정답 ${s.hit}개</span></div></div>`).join("")}</div>` : `<p class="empty">퀴즈를 풀면 분석이 쌓여요.</p>`}
          </section>
        </section>
        <section class="section" style="margin-top:14px;">
          <form class="form" id="newWordForm">
            <h2>우리 세대는 이렇게 써요!</h2>
            <p class="meaning" style="margin: 7px 0 16px;">등록하면 작성자 닉네임이 함께 표시되고, 같은 서버에 접속한 사용자 모두가 볼 수 있어요.</p>
            <div class="form-grid">
              <label>사용 세대
                <select name="age" required>${ageGroups.map(a => `<option>${a}</option>`).join("")}</select>
              </label>
              <label>분야 <input name="field" required placeholder="예: 감정, 칭찬, 게임"></label>
              <label>단어 <input name="word" required placeholder="신조어를 입력하세요"></label>
              <label class="wide">의미 <textarea name="meaning" required placeholder="무슨 뜻인지 적어주세요"></textarea></label>
              <label class="wide">예문 <textarea name="example" required placeholder="실제로 쓰는 문장을 적어주세요"></textarea></label>
            </div>
            <div class="actions"><button class="primary" type="submit">${icon("plus")} 신조어 등록</button></div>
          </form>
        </section>
      `;
    }

    function wordCard(w) {
      return `
        <article class="word-card">
          <div class="card-top">
            <button class="word-title" data-detail="${esc(w.id)}"><h3>${esc(w.word)}</h3></button>
            <button class="heart ${state.liked.includes(w.id) ? "active" : ""}" data-heart="${esc(w.id)}" title="관심 단어 저장">${icon("heart")}</button>
          </div>
          <p class="meaning">${esc(w.meaning)}</p>
          <div class="meta">${w.ages.map(a => `<span class="tag">${esc(a)}</span>`).join("")}<span class="tag">${esc(w.field)}</span><span class="tag owner">by ${esc(w.author || "익명")}</span></div>
        </article>
      `;
    }

    function rankPanel(title, list) {
      const top = [...list].sort((a,b) => b.rank - a.rank).slice(0, 3);
      return `
        <section class="rank-panel">
          <div class="section-head"><h3>${esc(title)}</h3><button class="link-btn" data-view="dictionary">더보기</button></div>
          <div class="rank-list">${top.map(rankRow).join("") || `<p class="empty">관심 단어를 저장해보세요.</p>`}</div>
        </section>
      `;
    }

    function rankRow(w, i) {
      return `<button class="rank-row" data-detail="${esc(w.id)}"><div class="rank-num">${i+1}</div><div><strong>${esc(w.word)}</strong><span>${esc(w.field)} · ${esc(w.ages.join(", "))} · by ${esc(w.author || "익명")}</span></div><span>${w.rank}</span></button>`;
    }

    function emptyCard() {
      return `<article class="word-card"><h3>검색 결과 없음</h3><p class="meaning">다른 검색어를 입력하거나 직접 신조어를 등록해보세요.</p></article>`;
    }

    function likedWords() {
      return state.words.filter(w => state.liked.includes(w.id));
    }

    function bindEvents() {
      document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", () => {
        state.view = btn.dataset.view;
        render();
      }));
      document.querySelectorAll("[data-heart]").forEach(btn => btn.addEventListener("click", e => {
        e.stopPropagation();
        const id = btn.dataset.heart;
        state.liked = state.liked.includes(id) ? state.liked.filter(x => x !== id) : [...state.liked, id];
        saveLocal();
        render();
      }));
      document.querySelectorAll("[data-detail]").forEach(btn => btn.addEventListener("click", () => showDetail(btn.dataset.detail)));
      const search = document.getElementById("searchInput");
      search.addEventListener("input", e => {
        state.search = e.target.value;
        state.view = "dictionary";
        clearTimeout(searchTimer);
        searchTimer = setTimeout(render, 160);
      });
      const restart = document.getElementById("restartQuiz");
      if (restart) restart.addEventListener("click", () => { startQuiz(true); render(); });
      document.querySelectorAll("[data-choice]").forEach(btn => btn.addEventListener("click", () => answerQuiz(btn)));
      const newWordForm = document.getElementById("newWordForm");
      if (newWordForm) newWordForm.addEventListener("submit", submitWord);
    }

    function showDetail(id) {
      const w = state.words.find(x => x.id === id);
      if (!w) return;
      const modal = document.getElementById("modal");
      modal.innerHTML = `
        <div class="dialog">
          <div class="dialog-head">
            <div>
              <h2>${esc(w.word)}</h2>
              <div class="meta">${w.ages.map(a => `<span class="tag">${esc(a)}</span>`).join("")}<span class="tag">${esc(w.field)}</span><span class="tag owner">by ${esc(w.author || "익명")}</span></div>
            </div>
            <button class="close" id="closeModal">×</button>
          </div>
          <div class="detail-row"><strong>의미</strong><p class="meaning">${esc(w.meaning)}</p></div>
          <div class="detail-row"><strong>예문</strong><p class="meaning">"${esc(w.example)}"</p></div>
          <div class="detail-row"><strong>많이 쓰는 세대</strong><p class="meaning">${esc(w.ages.join(", "))}</p></div>
          <div class="detail-row"><strong>등록한 닉네임</strong><p class="meaning">${esc(w.author || "익명")}</p></div>
          <div class="actions">
            <button class="heart ${state.liked.includes(w.id) ? "active" : ""}" data-modal-heart title="관심 단어 저장">${icon("heart")}</button>
            <button class="primary" id="detailQuiz">${icon("quiz")} 이 단어로 퀴즈</button>
          </div>
        </div>
      `;
      modal.classList.add("active");
      document.getElementById("closeModal").addEventListener("click", () => modal.classList.remove("active"));
      modal.querySelector("[data-modal-heart]").addEventListener("click", () => {
        state.liked = state.liked.includes(w.id) ? state.liked.filter(x => x !== w.id) : [...state.liked, w.id];
        saveLocal();
        showDetail(w.id);
      });
      document.getElementById("detailQuiz").addEventListener("click", () => {
        if (!state.liked.includes(w.id)) state.liked.push(w.id);
        state.view = "quiz";
        startQuiz(true);
        saveLocal();
        render();
      });
    }

    function startQuiz(force) {
      if (state.quiz && !force) return;
      const liked = likedWords();
      const pool = liked.length >= 3 ? liked : state.words.filter(w => !w.ages.includes(state.user.age)).concat(state.words);
      const shuffled = [...pool].sort(() => Math.random() - .5).slice(0, 10);
      while (shuffled.length < 10 && state.words.length) shuffled.push(state.words[shuffled.length % state.words.length]);
      state.quiz = {
        index: 0,
        score: 0,
        done: false,
        misses: {},
        items: shuffled.map(w => {
          const wrong = state.words.filter(x => x.id !== w.id).sort(() => Math.random() - .5).slice(0, 3).map(x => x.meaning);
          return { ...w, answer: w.meaning, choices: [w.meaning, ...wrong].sort(() => Math.random() - .5) };
        })
      };
    }

    function answerQuiz(btn) {
      const q = state.quiz;
      const item = q.items[q.index];
      const ok = btn.dataset.choice === item.answer;
      btn.classList.add(ok ? "correct" : "wrong");
      q.score += ok ? 1 : 0;
      if (!state.quizStats[item.field]) state.quizStats[item.field] = { hit: 0, miss: 0 };
      state.quizStats[item.field][ok ? "hit" : "miss"] += 1;
      if (!ok) q.misses[item.field] = (q.misses[item.field] || 0) + 1;
      saveLocal();
      setTimeout(() => {
        q.index += 1;
        if (q.index >= 10) q.done = true;
        render();
      }, 520);
    }

    async function submitWord(e) {
      e.preventDefault();
      const formEl = e.currentTarget;
      if (!state.online) {
        toast("온라인 서버가 켜져 있어야 모든 사용자에게 단어가 공유돼요.");
        return;
      }
      const form = new FormData(formEl);
      const payload = {
        word: form.get("word").trim(),
        meaning: form.get("meaning").trim(),
        example: form.get("example").trim(),
        ages: [form.get("age")],
        field: form.get("field").trim(),
        author: state.user.nickname,
        authorId: state.user.userid
      };
      try {
        const data = await api("/api/words", { method: "POST", body: JSON.stringify(payload) });
        state.words = data.words;
        state.liked = Array.from(new Set([data.word.id, ...state.liked]));
        saveLocal();
        formEl.reset();
        toast("신조어가 모든 사용자에게 공유됐어요.");
        render();
        showDetail(data.word.id);
      } catch (error) {
        toast(error.message);
      }
    }

    function toast(message) {
      const old = document.querySelector(".toast");
      if (old) old.remove();
      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    loadWords();
  </script>
</body>
</html>
